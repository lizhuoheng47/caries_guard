services:
  mysql:
    image: mysql:8.4
    container_name: caries-mysql
    profiles: ["dev", "competition", "staging-real"]
    environment:
      MYSQL_ROOT_PASSWORD: ${CARIES_MYSQL_PASSWORD:-1234}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    ports:
      - "${CARIES_MYSQL_HOST_PORT:-13306}:3306"
    volumes:
      - caries_mysql_data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - caries-net

  mysql-init:
    image: mysql:8.4
    container_name: caries-mysql-init
    profiles: ["dev", "competition", "staging-real"]
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${CARIES_MYSQL_PASSWORD:-1234}
      CARIES_MYSQL_DATABASE_BIZ: ${CARIES_MYSQL_DATABASE_BIZ:-caries_biz}
      CARIES_MYSQL_DATABASE_AI: ${CARIES_MYSQL_DATABASE_AI:-caries_ai}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        case "$${CARIES_MYSQL_DATABASE_BIZ}" in *[!A-Za-z0-9_]*|"") echo "Invalid CARIES_MYSQL_DATABASE_BIZ"; exit 1;; esac
        case "$${CARIES_MYSQL_DATABASE_AI}" in *[!A-Za-z0-9_]*|"") echo "Invalid CARIES_MYSQL_DATABASE_AI"; exit 1;; esac
        mysql --protocol=tcp -hmysql -P3306 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --default-character-set=utf8mb4 -e "CREATE DATABASE IF NOT EXISTS $${CARIES_MYSQL_DATABASE_BIZ} DEFAULT CHARACTER SET utf8mb4 DEFAULT COLLATE utf8mb4_0900_ai_ci;"
        mysql --protocol=tcp -hmysql -P3306 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --default-character-set=utf8mb4 -e "CREATE DATABASE IF NOT EXISTS $${CARIES_MYSQL_DATABASE_AI} DEFAULT CHARACTER SET utf8mb4 DEFAULT COLLATE utf8mb4_0900_ai_ci;"
    restart: "no"
    networks:
      - caries-net

  redis:
    image: redis:7-alpine
    container_name: caries-redis
    profiles: ["dev", "competition", "staging-real"]
    ports:
      - "${CARIES_REDIS_HOST_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - caries-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: caries-rabbitmq
    profiles: ["dev", "competition", "staging-real"]
    environment:
      RABBITMQ_DEFAULT_USER: ${CARIES_RABBIT_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${CARIES_RABBIT_PASSWORD:-guest}
    ports:
      - "${CARIES_RABBIT_HOST_PORT:-5672}:5672"
      - "${CARIES_RABBIT_MGMT_HOST_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - caries-net

  minio:
    image: minio/minio:latest
    container_name: caries-minio
    profiles: ["dev", "competition", "staging-real"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${CARIES_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${CARIES_MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${CARIES_MINIO_HOST_PORT:-9000}:9000"
      - "${CARIES_MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - caries_minio_data:/data
    networks:
      - caries-net

  minio-init:
    image: minio/mc:latest
    container_name: caries-minio-init
    profiles: ["dev", "competition", "staging-real"]
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${CARIES_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${CARIES_MINIO_SECRET_KEY:-minioadmin}
      CARIES_BUCKET_IMAGE: ${CARIES_BUCKET_IMAGE:-caries-image}
      CARIES_BUCKET_VISUAL: ${CARIES_BUCKET_VISUAL:-caries-visual}
      CARIES_BUCKET_REPORT: ${CARIES_BUCKET_REPORT:-caries-report}
      CARIES_BUCKET_EXPORT: ${CARIES_BUCKET_EXPORT:-caries-export}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until mc alias set caries http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb -p "caries/$${CARIES_BUCKET_IMAGE}"
        mc mb -p "caries/$${CARIES_BUCKET_VISUAL}"
        mc mb -p "caries/$${CARIES_BUCKET_REPORT}"
        mc mb -p "caries/$${CARIES_BUCKET_EXPORT}"
        mc anonymous set none "caries/$${CARIES_BUCKET_IMAGE}"
        mc anonymous set none "caries/$${CARIES_BUCKET_VISUAL}"
        mc anonymous set none "caries/$${CARIES_BUCKET_REPORT}"
        mc anonymous set none "caries/$${CARIES_BUCKET_EXPORT}"
        printf '%s\n' '{"Rules":[{"ID":"expire-caries-export-after-7-days","Status":"Enabled","Filter":{"Prefix":""},"Expiration":{"Days":7}}]}' > /tmp/caries-export-lifecycle.json
        mc ilm import "caries/$${CARIES_BUCKET_EXPORT}" < /tmp/caries-export-lifecycle.json
        printf '%s\n' '{"Rules":[{"ID":"expire-caries-visual-after-30-days","Status":"Enabled","Filter":{"Prefix":""},"Expiration":{"Days":30}}]}' > /tmp/caries-visual-lifecycle.json
        mc ilm import "caries/$${CARIES_BUCKET_VISUAL}" < /tmp/caries-visual-lifecycle.json
    restart: "no"
    networks:
      - caries-net

  backend-java:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: caries-backend-java
    profiles: ["dev", "competition", "staging-real"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CARIES_MYSQL_HOST: mysql
      CARIES_MYSQL_PORT: 3306
      CARIES_MYSQL_DATABASE: ${CARIES_MYSQL_DATABASE_BIZ:-caries_biz}
      CARIES_MYSQL_USERNAME: root
      CARIES_MYSQL_PASSWORD: ${CARIES_MYSQL_PASSWORD:-1234}
      CARIES_FLYWAY_CLEAN_DISABLED: ${CARIES_FLYWAY_CLEAN_DISABLED:-true}
      CARIES_FLYWAY_CLEAN_ON_VALIDATION_ERROR: ${CARIES_FLYWAY_CLEAN_ON_VALIDATION_ERROR:-false}
      CARIES_REDIS_HOST: redis
      CARIES_REDIS_PORT: 6379
      CARIES_RABBIT_HOST: rabbitmq
      CARIES_RABBIT_PORT: 5672
      CARIES_RABBIT_USERNAME: ${CARIES_RABBIT_USERNAME:-guest}
      CARIES_RABBIT_PASSWORD: ${CARIES_RABBIT_PASSWORD:-guest}
      CARIES_STORAGE_PROVIDER: MINIO
      CARIES_MINIO_ENDPOINT: http://minio:9000
      CARIES_MINIO_ACCESS_KEY: ${CARIES_MINIO_ACCESS_KEY:-minioadmin}
      CARIES_MINIO_SECRET_KEY: ${CARIES_MINIO_SECRET_KEY:-minioadmin}
      CARIES_STORAGE_AUTO_CREATE_BUCKETS: ${CARIES_STORAGE_AUTO_CREATE_BUCKETS:-false}
      CARIES_IMAGE_ACCESS_SECRET: ${CARIES_IMAGE_ACCESS_SECRET:-docker-change-me-to-a-strong-image-access-secret}
      CARIES_BUCKET_IMAGE: ${CARIES_BUCKET_IMAGE:-caries-image}
      CARIES_BUCKET_VISUAL: ${CARIES_BUCKET_VISUAL:-caries-visual}
      CARIES_BUCKET_REPORT: ${CARIES_BUCKET_REPORT:-caries-report}
      CARIES_BUCKET_EXPORT: ${CARIES_BUCKET_EXPORT:-caries-export}
      CARIES_ANALYSIS_CALLBACK_SECRET: ${CARIES_ANALYSIS_CALLBACK_SECRET:-docker-change-me-to-a-strong-analysis-callback-secret}
      CARIES_ANALYSIS_MODEL_VERSION: ${CARIES_ANALYSIS_MODEL_VERSION:-caries-v1}
      CARIES_COMPETITION_MODE_ENABLED: ${CARIES_COMPETITION_MODE_ENABLED:-true}
      TZ: Asia/Shanghai
    ports:
      - "${CARIES_BACKEND_JAVA_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
    depends_on:
      mysql-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      caries-net:
        aliases:
          - backend-java


  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: caries-backend-python
    profiles: ["dev", "competition", "staging-real"]
    environment:
      CG_RABBIT_HOST: rabbitmq
      CG_RABBIT_PORT: 5672
      CG_RABBIT_USERNAME: ${CARIES_RABBIT_USERNAME:-guest}
      CG_RABBIT_PASSWORD: ${CARIES_RABBIT_PASSWORD:-guest}
      CG_ANALYSIS_EXCHANGE: ${CARIES_ANALYSIS_EXCHANGE:-caries.analysis.exchange}
      CG_ANALYSIS_REQUESTED_QUEUE: ${CARIES_ANALYSIS_REQUESTED_QUEUE:-caries.analysis.requested.queue}
      CG_ANALYSIS_REQUESTED_ROUTING_KEY: ${CARIES_ANALYSIS_REQUESTED_ROUTING_KEY:-analysis.requested}
      CG_JAVA_CALLBACK_URL: http://backend-java:8080/api/v1/internal/ai/callbacks/analysis-result
      CG_ANALYSIS_CALLBACK_SECRET: ${CARIES_ANALYSIS_CALLBACK_SECRET:-docker-change-me-to-a-strong-analysis-callback-secret}
      CG_CALLBACK_VISUAL_ASSET_MODE: ${CG_CALLBACK_VISUAL_ASSET_MODE:-metadata}
      CG_MODEL_VERSION: ${CARIES_ANALYSIS_MODEL_VERSION:-caries-v1}
      CG_AI_DOWNLOAD_IMAGES: "true"
      CG_MINIO_ENDPOINT: http://minio:9000
      CG_MINIO_ACCESS_KEY: ${CARIES_MINIO_ACCESS_KEY:-minioadmin}
      CG_MINIO_SECRET_KEY: ${CARIES_MINIO_SECRET_KEY:-minioadmin}
      CG_MINIO_BUCKET_IMAGE: ${CARIES_BUCKET_IMAGE:-caries-image}
      CG_MINIO_BUCKET_VISUAL: ${CARIES_BUCKET_VISUAL:-caries-visual}
      CG_BUCKET_REPORT: ${CARIES_BUCKET_REPORT:-caries-report}
      CG_BUCKET_EXPORT: ${CARIES_BUCKET_EXPORT:-caries-export}
      CG_MYSQL_HOST: mysql
      CG_MYSQL_PORT: 3306
      CG_MYSQL_DATABASE: ${CARIES_MYSQL_DATABASE_AI:-caries_ai}
      CG_MYSQL_USERNAME: root
      CG_MYSQL_PASSWORD: ${CARIES_MYSQL_PASSWORD:-1234}
      CG_DB_SCHEMA_BOOTSTRAP_ENABLED: "false"
      CG_DB_MIGRATION_ENABLED: "true"
      CG_RAG_INDEX_DIR: ${CG_RAG_INDEX_DIR:-/tmp/cariesguard/vector-index}
      CG_RAG_RUNTIME_ENABLED: ${CG_RAG_RUNTIME_ENABLED:-true}
      CG_RAG_DEFAULT_KB_CODE: ${CG_RAG_DEFAULT_KB_CODE:-caries-default}
      CG_RAG_DEFAULT_KB_NAME: ${CG_RAG_DEFAULT_KB_NAME:-CariesGuard Default Knowledge Base}
      CG_RAG_KNOWLEDGE_VERSION: ${CG_RAG_KNOWLEDGE_VERSION:-v1.0}
      CG_RAG_EMBEDDING_MODEL: ${CG_RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      CG_RAG_VECTOR_STORE_TYPE: ${CG_RAG_VECTOR_STORE_TYPE}
      CG_OPENSEARCH_HOSTS: ${CG_OPENSEARCH_HOSTS:-http://opensearch:9200}
      CG_OPENSEARCH_USERNAME: ${CG_OPENSEARCH_USERNAME:-}
      CG_OPENSEARCH_PASSWORD: ${CG_OPENSEARCH_PASSWORD:-}
      CG_OPENSEARCH_VERIFY_CERTS: ${CG_OPENSEARCH_VERIFY_CERTS:-false}
      CG_OPENSEARCH_CHUNK_INDEX: ${CG_OPENSEARCH_CHUNK_INDEX:-kb_chunk_index}
      CG_OPENSEARCH_DOC_INDEX: ${CG_OPENSEARCH_DOC_INDEX:-kb_doc_index}
      CG_RAG_EMBEDDING_PROVIDER: ${CG_RAG_EMBEDDING_PROVIDER}
      CG_RAG_EMBEDDING_BASE_URL: ${CG_RAG_EMBEDDING_BASE_URL}
      CG_RAG_EMBEDDING_API_KEY: ${CG_RAG_EMBEDDING_API_KEY}
      CG_RAG_EMBEDDING_DIMENSION: ${CG_RAG_EMBEDDING_DIMENSION:-256}
      CG_RAG_EMBEDDING_BATCH_SIZE: ${CG_RAG_EMBEDDING_BATCH_SIZE:-16}
      CG_RAG_TOP_K: ${CG_RAG_TOP_K:-5}
      CG_RAG_LEXICAL_TOP_K: ${CG_RAG_LEXICAL_TOP_K:-20}
      CG_RAG_DENSE_TOP_K: ${CG_RAG_DENSE_TOP_K:-20}
      CG_RAG_GRAPH_TOP_K: ${CG_RAG_GRAPH_TOP_K:-10}
      CG_RAG_FUSION_TOP_K: ${CG_RAG_FUSION_TOP_K:-12}
      CG_RAG_RERANK_TOP_K: ${CG_RAG_RERANK_TOP_K:-8}
      CG_RAG_ANSWER_EVIDENCE_TOP_K: ${CG_RAG_ANSWER_EVIDENCE_TOP_K:-6}
      CG_RAG_RERANK_PROVIDER: ${CG_RAG_RERANK_PROVIDER:-EMBEDDING}
      CG_RAG_RERANK_MODEL_NAME: ${CG_RAG_RERANK_MODEL_NAME:-embedding-similarity-reranker}
      CG_RAG_RERANK_BASE_URL: ${CG_RAG_RERANK_BASE_URL:-}
      CG_RAG_RERANK_API_KEY: ${CG_RAG_RERANK_API_KEY:-}
      CG_RAG_RERANK_TIMEOUT_SECONDS: ${CG_RAG_RERANK_TIMEOUT_SECONDS:-20}
      CG_NEO4J_URI: ${CG_NEO4J_URI:-bolt://neo4j:7687}
      CG_NEO4J_USERNAME: ${CG_NEO4J_USERNAME:-neo4j}
      CG_NEO4J_PASSWORD: ${CG_NEO4J_PASSWORD:-cariesguard}
      CG_NEO4J_DATABASE: ${CG_NEO4J_DATABASE:-neo4j}
      CG_LLM_PROVIDER_CODE: ${CG_LLM_PROVIDER_CODE}
      CG_LLM_MODEL_NAME: ${CG_LLM_MODEL_NAME}
      CG_LLM_BASE_URL: ${CG_LLM_BASE_URL}
      CG_LLM_API_KEY: ${CG_LLM_API_KEY}
      CG_LLM_SCENE_ROUTING_ENABLED: ${CG_LLM_SCENE_ROUTING_ENABLED:-false}
      CG_LLM_DOCTOR_PROVIDER_CODE: ${CG_LLM_DOCTOR_PROVIDER_CODE:-}
      CG_LLM_DOCTOR_MODEL_NAME: ${CG_LLM_DOCTOR_MODEL_NAME:-}
      CG_LLM_DOCTOR_BASE_URL: ${CG_LLM_DOCTOR_BASE_URL:-}
      CG_LLM_DOCTOR_API_KEY: ${CG_LLM_DOCTOR_API_KEY:-}
      CG_LLM_PATIENT_PROVIDER_CODE: ${CG_LLM_PATIENT_PROVIDER_CODE:-}
      CG_LLM_PATIENT_MODEL_NAME: ${CG_LLM_PATIENT_MODEL_NAME:-}
      CG_LLM_PATIENT_BASE_URL: ${CG_LLM_PATIENT_BASE_URL:-}
      CG_LLM_PATIENT_API_KEY: ${CG_LLM_PATIENT_API_KEY:-}
      CG_LLM_HEDGE_ENABLED: ${CG_LLM_HEDGE_ENABLED:-false}
      CG_LLM_HEDGE_DELAY_MS: ${CG_LLM_HEDGE_DELAY_MS:-250}
      CG_LLM_HEDGE_PROVIDER_CODE: ${CG_LLM_HEDGE_PROVIDER_CODE:-}
      CG_LLM_HEDGE_MODEL_NAME: ${CG_LLM_HEDGE_MODEL_NAME:-}
      CG_LLM_HEDGE_BASE_URL: ${CG_LLM_HEDGE_BASE_URL:-}
      CG_LLM_HEDGE_API_KEY: ${CG_LLM_HEDGE_API_KEY:-}
      CG_LLM_TIMEOUT_SECONDS: ${CG_LLM_TIMEOUT_SECONDS:-30}
      CG_LLM_RETRY_COUNT: ${CG_LLM_RETRY_COUNT:-1}
      CG_LLM_TEMPERATURE: ${CG_LLM_TEMPERATURE:-0.2}
      CG_LLM_ENABLE_FALLBACK_MOCK: ${CG_LLM_ENABLE_FALLBACK_MOCK:-true}
      CG_QWEN_VISION_ENABLED: ${CG_QWEN_VISION_ENABLED:-false}
      CG_QWEN_VISION_MODEL: ${CG_QWEN_VISION_MODEL:-qwen3-vl-plus}
      CG_QWEN_VISION_BASE_URL: ${CG_QWEN_VISION_BASE_URL:-}
      CG_QWEN_VISION_API_KEY: ${CG_QWEN_VISION_API_KEY:-}
      CG_ANALYSIS_KB_ENHANCEMENT_ENABLED: ${CG_ANALYSIS_KB_ENHANCEMENT_ENABLED:-false}
      CG_ANALYSIS_KB_CODE: ${CG_ANALYSIS_KB_CODE:-caries-default}
      # ── Phase 5: Model Runtime ──
      CG_AI_RUNTIME_MODE: ${CG_AI_RUNTIME_MODE}
      CG_MODEL_QUALITY_ENABLED: ${CG_MODEL_QUALITY_ENABLED}
      CG_MODEL_QUALITY_IMPL_TYPE: ${CG_MODEL_QUALITY_IMPL_TYPE:-HEURISTIC}
      CG_MODEL_TOOTH_DETECT_ENABLED: ${CG_MODEL_TOOTH_DETECT_ENABLED}
      CG_MODEL_TOOTH_DETECT_IMPL_TYPE: ${CG_MODEL_TOOTH_DETECT_IMPL_TYPE:-HEURISTIC}
      CG_MODEL_SEGMENTATION_ENABLED: ${CG_MODEL_SEGMENTATION_ENABLED}
      CG_MODEL_SEGMENTATION_IMPL_TYPE: ${CG_MODEL_SEGMENTATION_IMPL_TYPE:-HEURISTIC}
      CG_MODEL_GRADING_ENABLED: ${CG_MODEL_GRADING_ENABLED}
      CG_MODEL_GRADING_IMPL_TYPE: ${CG_MODEL_GRADING_IMPL_TYPE:-HEURISTIC}
      CG_MODEL_RISK_ENABLED: ${CG_MODEL_RISK_ENABLED}
      CG_MODEL_RISK_IMPL_TYPE: ${CG_MODEL_RISK_IMPL_TYPE:-HEURISTIC}
      CG_MODEL_DEVICE: ${CG_MODEL_DEVICE:-cpu}
      CG_MODEL_WEIGHTS_DIR: ${CG_MODEL_WEIGHTS_DIR:-/app/model-weights}
      CG_MODEL_SEGMENTATION_MANIFEST_PATH: ${CG_MODEL_SEGMENTATION_MANIFEST_PATH:-/app/assets/models/manifests/segmentation_v1.yaml}
      CG_MODEL_GRADING_MANIFEST_PATH: ${CG_MODEL_GRADING_MANIFEST_PATH:-/app/assets/models/manifests/grading_v1.yaml}
      CG_QUALITY_MODEL_PARAM_PATH: ${CG_QUALITY_MODEL_PARAM_PATH:-/app/model-weights/quality/quality_model_params.json}
      CG_QUALITY_MODEL_WEIGHTS_PATH: ${CG_QUALITY_MODEL_WEIGHTS_PATH:-/app/model-weights/quality/quality_model_params.json}
      CG_MODEL_CONFIDENCE_THRESHOLD: ${CG_MODEL_CONFIDENCE_THRESHOLD:-0.5}
      CG_SEGMENTATION_FORCE_FAIL: ${CG_SEGMENTATION_FORCE_FAIL:-false}
      CG_GRADING_FORCE_FAIL: ${CG_GRADING_FORCE_FAIL:-false}
      CG_UNCERTAINTY_REVIEW_THRESHOLD: ${CG_UNCERTAINTY_REVIEW_THRESHOLD:-0.35}
      TZ: Asia/Shanghai
    ports:
      - "${CARIES_BACKEND_PYTHON_HOST_PORT:-8001}:8001"
    volumes:
      - ./model-weights:/app/model-weights:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/ai/v1/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 30
    depends_on:
      mysql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      opensearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      backend-java:
        condition: service_healthy
    networks:
      - caries-net


networks:
  caries-net:
    name: caries-net

volumes:
  caries_mysql_data:
  caries_minio_data:
  caries_opensearch_data:
  caries_neo4j_data:
