spring:
  datasource:
    url: jdbc:mysql://${CARIES_MYSQL_HOST:mysql}:${CARIES_MYSQL_PORT:3306}/${CARIES_MYSQL_DATABASE:caries_biz}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
    username: ${CARIES_MYSQL_USERNAME:root}
    password: ${CARIES_MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${CARIES_REDIS_HOST:redis}
      port: ${CARIES_REDIS_PORT:6379}
  rabbitmq:
    host: ${CARIES_RABBIT_HOST:rabbitmq}
    port: ${CARIES_RABBIT_PORT:5672}
    username: ${CARIES_RABBIT_USERNAME:guest}
    password: ${CARIES_RABBIT_PASSWORD:guest}
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: ${CARIES_FLYWAY_CLEAN_DISABLED:true}
    clean-on-validation-error: ${CARIES_FLYWAY_CLEAN_ON_VALIDATION_ERROR:false}
  mvc:
    problemdetails:
      enabled: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  pattern:
    level: "%5p [%X{traceId}]"

management:
  health:
    rabbit:
      enabled: true

caries:
  security:
    jwt:
      secret: ${CARIES_JWT_SECRET:docker-change-me-to-a-strong-secret-key-with-at-least-32-bytes}
      access-token-expire-seconds: ${CARIES_JWT_EXPIRE_SECONDS:7200}
    sensitive:
      crypto-secret: ${CARIES_CRYPTO_SECRET:docker-change-me-to-a-strong-sensitive-crypto-secret}
      hash-secret: ${CARIES_HASH_SECRET:docker-change-me-to-a-strong-sensitive-hash-secret}
  storage:
    provider: ${CARIES_STORAGE_PROVIDER:MINIO}
    endpoint: ${CARIES_MINIO_ENDPOINT:http://minio:9000}
    access-key: ${CARIES_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${CARIES_MINIO_SECRET_KEY:minioadmin}
    secure: ${CARIES_MINIO_SECURE:false}
    default-presign-expire-seconds: ${CARIES_STORAGE_PRESIGN_EXPIRE_SECONDS:900}
    auto-create-buckets: ${CARIES_STORAGE_AUTO_CREATE_BUCKETS:false}
    proxy-access-secret: ${CARIES_IMAGE_ACCESS_SECRET:docker-change-me-to-a-strong-image-access-secret}
    buckets:
      image: ${CARIES_BUCKET_IMAGE:caries-image}
      visual: ${CARIES_BUCKET_VISUAL:caries-visual}
      report: ${CARIES_BUCKET_REPORT:caries-report}
      export: ${CARIES_BUCKET_EXPORT:caries-export}
  analysis:
    default-model-version: ${CARIES_ANALYSIS_MODEL_VERSION:caries-v1}
    callback-secret: ${CARIES_ANALYSIS_CALLBACK_SECRET:docker-change-me-to-a-strong-analysis-callback-secret}
    callback-allowed-clock-skew-seconds: ${CARIES_ANALYSIS_CALLBACK_SKEW_SECONDS:300}
    messaging:
      mode: rabbit
      rabbit:
        exchange: ${CARIES_ANALYSIS_EXCHANGE:caries.analysis.exchange}
        requested-queue: ${CARIES_ANALYSIS_REQUESTED_QUEUE:caries.analysis.requested.queue}
        completed-queue: ${CARIES_ANALYSIS_COMPLETED_QUEUE:caries.analysis.completed.queue}
        failed-queue: ${CARIES_ANALYSIS_FAILED_QUEUE:caries.analysis.failed.queue}
        requested-routing-key: ${CARIES_ANALYSIS_REQUESTED_ROUTING_KEY:analysis.requested}
        completed-routing-key: ${CARIES_ANALYSIS_COMPLETED_ROUTING_KEY:analysis.completed}
        failed-routing-key: ${CARIES_ANALYSIS_FAILED_ROUTING_KEY:analysis.failed}
  rag:
    base-url: ${CARIES_RAG_BASE_URL:http://backend-python:8001/ai/v1}
    connect-timeout-millis: ${CARIES_RAG_CONNECT_TIMEOUT_MS:${CARIES_RAG_CONNECT_TIMEOUT_MILLIS:3000}}
    request-timeout-millis: ${CARIES_RAG_READ_TIMEOUT_MS:${CARIES_RAG_REQUEST_TIMEOUT_MILLIS:10000}}
