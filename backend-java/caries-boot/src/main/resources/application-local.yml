spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/cg?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${CARIES_REDIS_HOST:127.0.0.1}
      port: ${CARIES_REDIS_PORT:6379}
  rabbitmq:
    host: ${CARIES_RABBIT_HOST:127.0.0.1}
    port: ${CARIES_RABBIT_PORT:5672}
    username: ${CARIES_RABBIT_USERNAME:guest}
    password: ${CARIES_RABBIT_PASSWORD:guest}
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  pattern:
    level: "%5p [%X{traceId}]"

caries:
  security:
    jwt:
      secret: ${CARIES_JWT_SECRET:change-me-to-a-strong-secret-key-with-at-least-32-bytes}
      access-token-expire-seconds: ${CARIES_JWT_EXPIRE_SECONDS:7200}
    sensitive:
      crypto-secret: ${CARIES_CRYPTO_SECRET:change-me-to-a-strong-sensitive-crypto-secret}
      hash-secret: ${CARIES_HASH_SECRET:change-me-to-a-strong-sensitive-hash-secret}
  image:
    storage:
      local-root: ${CARIES_IMAGE_STORAGE_ROOT:${user.dir}/var/image-storage}
      bucket-name: ${CARIES_IMAGE_BUCKET:caries-image}
      provider-code: ${CARIES_IMAGE_STORAGE_PROVIDER:MINIO}
      access-url-secret: ${CARIES_IMAGE_ACCESS_SECRET:change-me-to-a-strong-image-access-secret}
      access-url-expire-seconds: ${CARIES_IMAGE_ACCESS_EXPIRE_SECONDS:900}
  analysis:
    default-model-version: ${CARIES_ANALYSIS_MODEL_VERSION:caries-v1}
    callback-secret: ${CARIES_ANALYSIS_CALLBACK_SECRET:change-me-to-a-strong-analysis-callback-secret}
    callback-allowed-clock-skew-seconds: ${CARIES_ANALYSIS_CALLBACK_SKEW_SECONDS:300}
