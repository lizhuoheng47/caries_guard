spring:
  application:
    name: caries-guard-backend
  profiles:
    active: local
  jackson:
    time-zone: UTC
banner:
    location: classpath:banner.txt
    charset: UTF-8

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
