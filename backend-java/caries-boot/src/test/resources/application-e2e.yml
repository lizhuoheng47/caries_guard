spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/cg_e2e?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${CARIES_E2E_DB_USER:root}
    password: ${CARIES_E2E_DB_PASS:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${CARIES_REDIS_HOST:127.0.0.1}
      port: ${CARIES_REDIS_PORT:6379}
  rabbitmq:
    host: ${CARIES_RABBIT_HOST:127.0.0.1}
    port: ${CARIES_RABBIT_PORT:5672}
    username: ${CARIES_RABBIT_USERNAME:guest}
    password: ${CARIES_RABBIT_PASSWORD:guest}
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
    clean-on-validation-error: true
  mvc:
    problemdetails:
      enabled: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  health:
    rabbit:
      enabled: false

caries:
  security:
    jwt:
      secret: change-me-to-a-strong-secret-key-with-at-least-32-bytes
      access-token-expire-seconds: 7200
    sensitive:
      crypto-secret: change-me-to-a-strong-sensitive-crypto-secret
      hash-secret: change-me-to-a-strong-sensitive-hash-secret
  storage:
    provider: MINIO
    endpoint: http://127.0.0.1:9000
    access-key: minioadmin
    secret-key: minioadmin
    secure: false
    default-presign-expire-seconds: 900
    proxy-access-secret: change-me-to-a-strong-image-access-secret
    buckets:
      image: caries-image
      visual: caries-visual
      report: caries-report
      export: caries-export
  analysis:
    default-model-version: caries-v1
    callback-secret: change-me-to-a-strong-analysis-callback-secret
    callback-allowed-clock-skew-seconds: 300
    messaging:
      mode: logging
